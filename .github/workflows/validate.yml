name: Validate structural ledger

on:
  push:
    branches:
      - "main"

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required files
        run: |
          test -f scripts/validate_examples.py
          test -f scripts/validate_graphs.py
          test -f scripts/validate_predictions.py
          test -f scripts/validate_royalties.py

          test -f schemas/structural-precedence-record.schema.json
          test -f schemas/canonical-structure-registry.schema.json
          test -f schemas/structure-lineage-graph.schema.json
          test -f schemas/prediction-outcome-audit.schema.json
          test -f schemas/royalty-contribution-binding.schema.json

          test -f registry/canonical-structures.yaml
          test -f graphs/core-lineage.yaml
          test -f predictions/prediction-outcome-audit.example.yaml
          test -f royalties/royalty-contribution-binding.example.yaml

      - name: Validate precedence records and registry
        run: |
          python scripts/validate_examples.py

      - name: Validate lineage graphs
        run: |
          python scripts/validate_graphs.py

      - name: Validate prediction audits
        run: |
          python scripts/validate_predictions.py

      - name: Validate royalty bindings
        run: |
          python scripts/validate_royalties.py
